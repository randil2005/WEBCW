<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
        <title>Document</title>
        <link rel="stylesheet" href="styles.css">
        <style>
            h1 {
                text-align: center;
                color: #2C9452;
            }
            h3 {
                padding: 0 20px;
                text-align: center;
            }
            button {
                background-color: #2C9452;
                color: white;
                height: 40px;
                width: 80px;
                border: none;
                border-radius: 16px;
                margin: 0 10px 10px 10px;
                font-family: Poppins;
                font-weight: 600;
            }
            button:hover {
                cursor: pointer;
                background-color: white;
                color: #2C9452;
                transition: 0.3s ease;
                border: solid 1px #565e63;
            }
            .outline {
                display: flex;
                justify-items: center;
            }
            .spacing {
                width: 1%;
            }
            .sectionCard {
                background-color:rgba(214, 241, 214, 0.845);
                margin-bottom: 20px;
                border-radius: 10px;
                width: 49.5% ;
                height: auto;
            }
            .progress-container {
                background: #565e63c4;
                border-radius: 20px;
                overflow: hidden;
            }
            .progress-bar {
                height: 20px;
                width: 0%;
                background: #2C9452;
                text-align: center;
                color: white;
                font-size: 12px;
            }
        </style>
    </head>
    <body>
        <header>
           <nav>
                <a href="home.html"><img src="images/logo.png" alt="GoGreen logo" id="logo"></a>
                <ul>
                    <li><a href="home.html">Home</a></li>
                    <li><a href="ais.html">Simulator</a></li>
                    <li><a href="gallery.html">Gallery</a></li>
                    <li><a href="feedback.html">Feedback</a></li>
                    <li><a href="programs.html">Programs</a></li>
                    <li><a href="team.html">Team</a></li>
                    <li><a href="sitemap.html">Sitemap</a></li>
                </ul>
                <a href="profile.html"><img src="images/USER_PROFILE.png" alt="user profile" id="login"></a>
            </nav>
        </header>

        <hr>

        <main>
            <h1>USER PROFILE</h1>
            <section>
                <center>
                    <button id="create">CREATE</button>
                </center>
            </section>

            <br>
            
            <section class="outline">
                <section class="sectionCard">
                    <h3>Personal Information</h3>
                    <center>
                        <button id="start_personal">START</button>
                    </center>
                </section>

                <section class="spacing"></section>

                <section class="sectionCard">
                    <h3>Contact Details</h3>
                    <center>
                        <button id="start_contact">START</button>
                    </center>
                </section>
            </section>

            <section class="outline">
                <section class="sectionCard">
                    <h3>Interests</h3>
                    <center>
                        <button id="start_interests">START</button>
                    </center>
                </section>

                <section class="spacing"></section>

                <section class="sectionCard">
                    <h3>Goals and Targets</h3>
                    <center>
                        <button id="start_goals">START</button>
                    </center>
                </section>
            </section>
            
            <section class="progress-container">
                <section class="progress-bar"></section>
            </section>
        </main>

        <hr>
        <footer>
            <p><a href="#">page editor</a></p>
            <p><a href="#">Validation</a></p>
        </footer>
    
    </body>
</html>
