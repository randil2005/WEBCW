<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profile Builder</title>

<style>
/* ===== Global Layout ===== */
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f6f8;
}

header {
    background: #2c3e50;
    color: white;
    padding: 15px;
}

nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

nav ul {
    list-style: none;
    display: flex;
    gap: 15px;
}

nav ul li a {
    color: white;
    text-decoration: none;
}

nav ul li a.active {
    border-bottom: 2px solid #1abc9c;
}

/* ===== Main ===== */
main {
    padding: 20px;
}

/* ===== Buttons ===== */
button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    background: #1abc9c;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: #16a085;
}

/* ===== Profile Box ===== */
.profile-box {
    background: white;
    padding: 20px;
    margin-top: 20px;
    border-radius: 8px;
    display: none;
}

.step-section {
    display: none;
    margin-top: 15px;
}

/* ===== Progress Bar ===== */
.progress-container {
    background: #ddd;
    border-radius: 20px;
    overflow: hidden;
    margin-top: 15px;
}

.progress-bar {
    height: 20px;
    width: 0%;
    background: #1abc9c;
    text-align: center;
    color: white;
    font-size: 12px;
}

/* ===== Footer ===== */
footer {
    background: #2c3e50;
    color: white;
    text-align: center;
    padding: 10px;
    margin-top: 30px;
}
</style>
</head>

<body>

<!-- ===== Header ===== -->
<header>
    <nav>
        <h2>My Website</h2>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#" class="active">Profile</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
</header>

<!-- ===== Main ===== -->
<main>
    <h1>User Profile Builder</h1>
    <p>Click the button below to start building your profile step-by-step.</p>

    <button onclick="startProfile()">Start Profile</button>
    <button onclick="redoStep(1)">Redo Step 1</button>
    <button onclick="redoStep(2)">Redo Step 2</button>
    <button onclick="redoStep(3)">Redo Step 3</button>

    <!-- Progress -->
    <div class="progress-container">
        <div class="progress-bar" id="progressBar">0%</div>
    </div>

    <!-- Profile Output -->
    <div class="profile-box" id="profileBox">
        <h2>Your Profile</h2>

        <div class="step-section" id="step1Display">
            <h3>Basic Details</h3>
            <p id="name"></p>
            <p id="username"></p>
            <p id="role"></p>
        </div>

        <div class="step-section" id="step2Display">
            <h3>Interests</h3>
            <p id="interest"></p>
            <p id="hobby"></p>
            <p id="preference"></p>
        </div>

        <div class="step-section" id="step3Display">
            <h3>Goals & Actions</h3>
            <p id="goal"></p>
            <p id="action"></p>
            <p id="commitment"></p>
        </div>
    </div>
</main>

<!-- ===== Footer ===== -->
<footer>
    <p>Page Editor | Validation</p>
</footer>

<script>
let profile = {
    step1: {},
    step2: {},
    step3: {}
};

let completedSteps = {
    step1: false,
    step2: false,
    step3: false
};

/* ===== Start Profile ===== */
function startProfile() {
    step1();
    step2();
    step3();
}

/* ===== Step 1 ===== */
function step1() {
    let name = prompt("Enter your name (or press Cancel to skip):");
    let username = prompt("Enter your username:");
    let role = prompt("Enter your role:");

    if (name) {
        profile.step1.name = name;
        document.getElementById("name").innerText = "Name: " + name;
    }
    if (username) {
        profile.step1.username = username;
        document.getElementById("username").innerText = "Username: " + username;
    }
    if (role) {
        profile.step1.role = role;
        document.getElementById("role").innerText = "Role: " + role;
    }

    if (name || username || role) {
        completedSteps.step1 = true;
        document.getElementById("step1Display").style.display = "block";
    }

    updateUI();
}

/* ===== Step 2 ===== */
function step2() {
    let interest = prompt("What is your main interest?");
    let hobby = prompt("What is your hobby?");
    let preference = prompt("Your preference?");

    if (interest) {
        profile.step2.interest = interest;
        document.getElementById("interest").innerText = "Interest: " + interest;
    }
    if (hobby) {
        profile.step2.hobby = hobby;
        document.getElementById("hobby").innerText = "Hobby: " + hobby;
    }
    if (preference) {
        profile.step2.preference = preference;
        document.getElementById("preference").innerText = "Preference: " + preference;
    }

    if (interest || hobby || preference) {
        completedSteps.step2 = true;
        document.getElementById("step2Display").style.display = "block";
    }

    updateUI();
}

/* ===== Step 3 ===== */
function step3() {
    let goal = prompt("What is your goal?");
    let action = prompt("What action have you taken?");
    let commitment = prompt("Your commitment?");

    if (goal) {
        profile.step3.goal = goal;
        document.getElementById("goal").innerText = "Goal: " + goal;
    }
    if (action) {
        profile.step3.action = action;
        document.getElementById("action").innerText = "Action: " + action;
    }
    if (commitment) {
        profile.step3.commitment = commitment;
        document.getElementById("commitment").innerText = "Commitment: " + commitment;
    }

    if (goal || action || commitment) {
        completedSteps.step3 = true;
        document.getElementById("step3Display").style.display = "block";
    }

    updateUI();
}

/* ===== Update UI ===== */
function updateUI() {
    document.getElementById("profileBox").style.display = "block";

    let completed = Object.values(completedSteps).filter(v => v).length;
    let percentage = (completed / 3) * 100;

    let bar = document.getElementById("progressBar");
    bar.style.width = percentage + "%";
    bar.innerText = percentage + "%";
}

/* ===== Redo Steps ===== */
function redoStep(step) {
    if (step === 1) step1();
    if (step === 2) step2();
    if (step === 3) step3();
}
</script>

</body>
</html>
