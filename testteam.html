        <style>
            .team{
                display: flex;
                justify-content: center;
                align-items: center;
                margin-top: 5%;
                gap: 2.5%;
                background-color: bisque;
            }
            .student{
                position: relative;
                height: 420px;
                width: 22.5%;
                text-align: center;
            }
            .student img{
                display: block;
                height: 100%;
                width: 100%;
                border-radius: 15px;
            }
            .name{
                position: absolute;
                top: 1.5%;
                width: 100%;
                text-align: center;
                color:white;
                z-index: 1;
            }
            .student::after {
                content: "";
                position: absolute;
                inset: 0;
                background: rgba(0, 0, 0, 0.2);
                border-radius: 15px;
            }
            .social{
                position: absolute;
                width: 100%;
                display: flex;
                justify-content: center;
                gap: 20%;
                bottom: 3.5%;
            }
            .social svg {
                width: 30px;
                height: 30px;
                color: white;
            }
            .social svg:hover{
                cursor: pointer;
            }
        </style>
