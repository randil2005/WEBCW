        <style>
            .team{
                display: flex;
                justify-content: center;
                align-items: center;
                margin-top: 5%;
                gap: 2.5%;
            }
            .student{
                position: relative;
                height: 420px;
                width: 22.5%;
                text-align: center;
            }
            .student img{
                display: block;
                height: 100%;
                width: 100%;
                object-fit: cover;
                object-position: center;
                border-radius: 15px;
                transition: 0.3s;
                z-index: 1;
            }
            .name{
                position: absolute;
                top: 1.5%;
                width: 100%;
                text-align: center;
                color:white;
                z-index: 1;
            }
            .student::after {
                content: "";
                position: absolute;
                inset: 0;
                background: rgba(0, 0, 0, 0.2);
                border-radius: 15px;
                z-index: 0;
            }
            .student:hover {
                transform: scale(1.05);
            }
            .student:hover::after {
                background: rgba(0,0,0,0.4);
            }
            .student hr{
                position: absolute;
                bottom: 50px;
                left: 5%;
                width: 90%;
                border: none;
                height: 1px;
                background: rgba(255,255,255,0.8);
            }
            .social{
                position: absolute;
                width: 100%;
                display: flex;
                justify-content: center;
                gap: 20%;
                bottom: 3.5%;
                z-index: 1;
            }
            .social svg {
                width: 30px;
                height: 30px;
                fill: rgba(255, 255, 255, 0.978);
                transition: all 0.25s ease;
                cursor: pointer;
            }
            .social svg:hover{
                transform: translateY(-5px);
                transition: 0.3s;
            }
        </style>
