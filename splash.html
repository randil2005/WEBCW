<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="4; url=home.html">
    <title>GoGreen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <style>

        body{
            background-image: url(images/bg.png);
            background-size:cover;
            background-position:center;
            text-align:center;
            color:#2BA62F;
            margin: 5px;
        }

        .splashContent h1{
            margin-top: 30px;
            font-size: 40px;
            font-weight: 700;
        }

        .splashContent h1, .splashContent h3{
            color: #377E25;
            margin-bottom: 5px;
        }

        .splashContent h2{
            color: #4085aa;
        }

        .team h3{
            margin: 5px 0px;
        }

        /*Loader animation using CSS keyframes*/
        .loader{
            width:50px;
            height:50px;
            border:8px solid #f3f3f3;
            border-top:8px solid #356b51;
            border-radius:50%;
            margin:2px auto 5px;
            animation: rotate 1s linear infinite;
        }

        /* Rotation animation */
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to  { transform: rotate(360deg); }
        }

        #skip{
            padding:10px 20px;
            font-size:16px;
            margin-top:10px;
            border-radius: 25px;
            border: none;
            background-color: #307c4ddc;
            color: white;
            font-weight: 650;
        }
        
        #skip:hover {
            background-color: #307c4da2;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
        }

        #splashlogo {
            width: 100px;
            height: auto;
        }
        
    </style>
</head>

<body>
    <!-- Splash screen showing introduction to SDG 7 -->
    <div class="splashContent">

        <h1>Affordable & Clean Energy</h1>
        <h2>for the future</h2>

        <h3>Promoting clean and affordable energy solutions for a sustainable and better future. </h3><br>
        <img src="images/logo.png" alt="GoGreen logo" id="splashlogo">

    </div>

    <div class="team">

        <h3>A project by:</h3>
        <h3>Thivina Abishek | Damian De Cruz | Danella De Cruz | Randil Shehan</h3><br>

    </div>

    <div class="loader"></div>

    <p id="countdown">Entering site in 4...</p>

    <button id="skip" aria-label="Skip intro and go to home page">Skip Intro</button>


    <script>
        // Countdown timer for splash screen
        let time = 4;
        let countdown = document.getElementById("countdown");

        let timer = setInterval(function(){
            time--;
            countdown.textContent = "Entering site in "+ time +"...";

            if(time <= 0){
                clearInterval(timer);
            }
            
        },1000);

        // Skip button allowing user to head to home page immediately
        document.getElementById("skip").onclick = function(){
            window.location.href = "home.html";
        }

    </script>

</body>
</html>
