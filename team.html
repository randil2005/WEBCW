        <style>
            .p-cards{
                display: flex;

            .p-card1{
                flex: 1 1 250px;
                max-width: 300px;
                height: 400px;
                border-radius: 10px;
            }
            .p-card1{
                background: rgba(226, 220, 220, 0.5);

                padding: 20px;
                transition: 0.3s ease;
            }
            .p-card1:hover {
                box-shadow: 0 0 15px rgba(0, 150, 255, 0.8);
            }
            .p-card1 img{
                margin: 30px 0px;
                height: 150px;
                width: 150px;
                object-fit: cover;
                border-radius: 50%;
                object-fit: cover;
                transition: transform 0.4s ease;
            }
            .p-card1 img:hover{
                transform: scale(1.1);
            }
            .p-card1 h4{
                margin: 0;
            }
