<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
        <title>Document</title>
        <link rel="stylesheet" href="styles.css">
        <style>
            form {
                width: 80%;
                max-width: 500px;
                margin: 20px auto;
                text-align: left;
            }

            fieldset {
                border: 1px solid #ccc;
                padding: 15px;
                margin-bottom: 15px;
                border-radius: 10px;
            }

            legend {
                font-weight: bold;
            }

            label{
                display: flex;
                width: 100%;
            }

            input, textarea, select {
                width: 100%;
                margin: 5px 0 15px;
                padding: 5px;
                box-sizing: border-box;
                border-radius: 10px;
                border: 1px solid #ccc;
            }

            textarea{
                resize: vertical;
            }

            #counter{
                margin-top: 0;
            }

            button {
                background: green;
                color: white;
                border: none;
                padding: 10px;
                border-radius: 8px;
                cursor: pointer;
            }

            button:hover {
                background: darkgreen;
            }

            .error {
                color: red;
                font-size: 13px;
            }

            .success {
                color: green;
                font-weight: bold;
            }

            p{
                text-align: center;
            }
            
        </style>
    </head>
    <body>
        <header>
            <nav>
                <a href="home.html"><img src="images/logo.png" alt="GoGreen logo" id="logo"></a>
                <ul>
                    <li><a href="home.html">Home</a></li>
                    <li><a href="ais.html">Simulator</a></li>
                    <li><a href="gallery.html">Gallery</a></li>
                    <li><a href="feedback.html" class="active">Feedback</a></li>
                    <li><a href="programs.html">Programs</a></li>
                    <li><a href="team.html">Team</a></li>
                    <li><a href="sitemap.html">Sitemap</a></li>
                </ul>
                <a href="profile.html"><img src="images/USER_PROFILE.png" alt="user profile" id="login"></a>
            </nav>
        </header>

        <hr>

        <form id="feedback" method="post">
            <fieldset>
                <legend>Personal Details</legend>

                <label for="name">Full Name:</label>
                <input type="text" id="name">
                <span class="error" id="nameError"></span>

                <label for="email">Email:</label>
                <input type="email" id="email">
                <span class="error" id="emailError"></span>

                <label for="phone">Telephone:</label>
                <input type="tel" id="phone">

                <label for="address">Address:</label>
                <textarea id="address"></textarea>

            </fieldset>
            <fieldset>
                <legend>Feedback Details</legend>

                <label for="message">Message:</label>
                <textarea id="message" maxlength="150"></textarea>
                <p id="counter">150 characters remaining</p>

                <label for="category">Category:</label>
                <select id="category">
                <option value="">Select option</option>
                <option>Programs</option>
                <option>Website</option>
                <option>General</option>
                </select>

                <label for="date">Date:</label>
                <input type="date" id="date">

                <label for="datetime">Date & Time:</label>
                <input type="datetime-local" id="datetime">

            </fieldset>

            <button type="submit">Submit</button>
            <button type="reset">Reset</button>

            <p id="sMsg" class="success"></p>

        </form>
        <script>

            //--->Character Counter
            let message = document.getElementById("message");
            let counter = document.getElementById("counter");

            message.addEventListener("input", function() {
                let remaining = 150 - message.value.length;
                counter.textContent = remaining + " characters remaining";
            });

            //--->Form Validation
            document.getElementById("feedback").addEventListener("submit", function(e) {

                e.preventDefault();

                let name = document.getElementById("name").value.trim();
                let email = document.getElementById("email").value.trim();

                let valid = true;

                //--->Clear previous errors
                document.getElementById("nameError").textContent = "";
                document.getElementById("emailError").textContent = "";
                document.getElementById("sMsg").textContent = "";

                //--->Name validation
                if (name === "") {
                    document.getElementById("nameError").textContent = "Name is required";
                    valid = false;
                }

                //--->Email validation
                if (email === "" || !email.includes("@")) {
                    document.getElementById("emailError").textContent = "Enter a valid email";
                    valid = false;
                }

                //--->Success message
                if (valid) {
                    document.getElementById("sMsg").textContent = "Thank you! Your feedback has been submitted.";
                }

            });

        </script>
        <hr>
        <footer>
            <p><a href="#">page editor</a></p>
            <p><a href="#">Validation</a></p>
        </footer>
    
    </body>
</html>
