<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>GoGreen</title>
    <style>
        body {
            padding: 10px;
        }
        svg {
            width: 100%;
            height: auto;
            border: 2px solid black;
        }
        svg path {
            stroke: #2C9452;
            stroke-width: 1px;
            fill: none;
        }
        .nodeBox {
            stroke-width: 1px;
            stroke: whitesmoke;
            fill: #2C9452;
        }
        .boxText{
            font-size: 9px;
            fill: white;
            text-anchor: middle;
            dominant-baseline: middle;
        }
        .hoverEffect:hover rect{
            fill: #038031;
            cursor: pointer;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
            transition: 0.2s ease;
        }
        .hoverEffect:hover text , image{
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        
    </header>
    <main>
        <svg viewbox="0 0 1000 600">
            <!--SplashScreen-->
            <g class="hoverEffect" id="SPLASH">
                <rect x="460" y="10" rx="10" ry="10" width="80" height="80" class="nodeBox" />
                <text x="500" y="70" class="boxText">SPLASH SCREEN</text>
                <image href="images/SPLASHSCREEN.png" x="475" y="15" width="50" height="50" />
            </g>

            <!--Home-->
            <g class="hoverEffect" id="HOME">
                <rect x="460" y="120" rx="10" ry="10" width="80" height="80" class="nodeBox" />
                <text x="500" y="180" class="boxText">HOME</text>
                <image href="images/HOME.png" x="475" y="125" width="50" height="50" />
            </g>
            
            <!--Content-->
            <g class="hoverEffect" id="CONTENT">
                <rect x="460" y="315" rx="10" ry="10" width="80" height="80" class="nodeBox" />
                <text x="500" y="375" class="boxText">CONTENT</text>
                <image href="images/CONTENT.png" x="475" y="320" width="50" height="50" />
            </g>

            <!--Content subPage 1-->
            <g class="hoverEffect" id="PAGE1">
                <rect x="190" y="510" rx="10" ry="10" width="80" height="80" class="nodeBox" />
                <text x="230" y="570" class="boxText">PAGE 1</text>
                <image href="images/CONTENT_PAGE.png" x="205" y="515" width="50" height="50" />
            </g>

            <!--Content subPage 2-->
            <g class="hoverEffect" id="PAGE2">
                <rect x="370" y="510" rx="10" ry="10" width="80" height="80" class="nodeBox" />
                <text x="410" y="570" class="boxText">PAGE 2</text>
                <image href="images/CONTENT_PAGE.png" x="385" y="515" width="50" height="50" />
            </g>

            <!--Content subPage 3-->
            <g class="hoverEffect" id="PAGE3">
                <rect x="550" y="510" rx="10" ry="10" width="80" height="80" class="nodeBox" />
                <text x="590" y="570" class="boxText">PAGE 3</text>
                <image href="images/CONTENT_PAGE.png" x="565" y="515" width="50" height="50" />
            </g>

            <!--Content subPage 4-->
            <g class="hoverEffect" id="PAGE4">
                <rect x="730" y="510" rx="10" ry="10" width="80" height="80" class="nodeBox" />
                <text x="770" y="570" class="boxText">PAGE 4</text>
                <image href="images/CONTENT_PAGE.png" x="745" y="515" width="50" height="50" />
            </g>

            <!--Paths-->
            <g>
                <path d="M 500 90 l 0 30" /> <!--Splash : Home-->
                
                <path d="M 500 200 l 0 115" /> <!--Home : Content-->

                <path d="M 500 395 C 500 460, 230 450, 230 510" /> <!--Content : Page 1-->
                <path d="M 500 395 C 500 450, 410 450, 410 510" /> <!--Content : Page 2-->
                <path d="M 500 395 C 500 450, 590 450, 590 510" /> <!--Content : Page 3-->
                <path d="M 500 395 C 500 460, 770 450, 770 510" /> <!--Content : Page 4-->
            </g>
            
        </svg>
    </main>
    <footer>
        
    </footer>
    <script>
        document.getElementById("SPLASH").onclick = function(){
            window.location.href = "splash.html" ;
        }
        document.getElementById("HOME").onclick = function(){
            window.location.href = "home.html" ;
        }
        document.getElementById("CONTENT").onclick = function(){
            window.location.href = "content.html" ;
        }
    </script>
</body>
</html>
