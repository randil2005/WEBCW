    <title>GoGreen</title>
    <style>
        svg {
            width: 100%;
            height: auto;
        }
        .nodeBox {
            stroke-width: 1px;
            stroke: whitesmoke;
            fill: #2C9452;
        }
        .boxText{
            font-size: 9px;
            fill: white;
            text-anchor: middle;
            dominant-baseline: middle;
        }
        .hoverEffect:hover rect {
            fill: #038031;
            cursor: pointer;
            filter: drop-shadow(0 0 5px rgba(4, 152, 58, 0.85));
            transition: 0.3s ease;
        }
        .hoverEffect:hover text , image {
            cursor: pointer;
        }
        .subNodeBox {
            stroke-width: 1px;
            stroke: whitesmoke;
            fill: #565e63;
        }
        .subBoxText {
            font-size: 8px;
            fill: white;
            text-anchor: middle;
            dominant-baseline: middle;
        }
        .subHoverEffect:hover rect {
            fill: #353E43;
            cursor: pointer;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.7));
            transition: 0.3s ease;
        }
        .subHoverEffect:hover text , image {
            cursor: pointer;
        }
        .greenpath {
            stroke: #2C9452;
            stroke-width: 1px;
            fill: none;
        }
        .greypath{
            stroke: #565e63;
            stroke-width: 1px;
            fill: none;
        }
    </style>
</head>
