<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>GoGreen</title>
    <style>
        svg {
            width: 100%;
            height: auto;
            border: 2px solid black;
        }
        .nodeBox {
            stroke-width: 1px;
            stroke: whitesmoke;
            fill: #2C9452;
        }
        .boxText{
            font-size: 9px;
            fill: white;
            text-anchor: middle;
            dominant-baseline: middle;
        }
        .hoverEffect:hover rect {
            fill: #038031;
            cursor: pointer;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
            transition: 0.2s ease;
        }
        .hoverEffect:hover text , image {
            cursor: pointer;
        }
        .subNodeBox {
            stroke-width: 1px;
            stroke: whitesmoke;
            fill: #565e63;
        }
        .subBoxText {
            font-size: 8px;
            fill: white;
            text-anchor: middle;
            dominant-baseline: middle;
        }
        .subHoverEffect:hover rect {
            fill: #353E43;
            cursor: pointer;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
            transition: 0.2s ease;
        }
        .subHoverEffect:hover text , image {
            cursor: pointer;
        }
        .greenpath {
            stroke: #2C9452;
            stroke-width: 1px;
            fill: none;
        }
        .greypath{
            stroke: #353E43;
            stroke-width: 1px;
            fill: none;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="feedback.html">Feedback</a></li>
                <li><a href="team.html">Team</a></li>
            </ul>
        </nav>
    </header>

    <hr>

    <main>
        <svg viewbox="0 0 1000 650">
            <!--SplashScreen-->
            <g class="hoverEffect" id="SPLASH">
                <rect x="460" y="10" rx="10" ry="10" width="80" height="80" class="nodeBox" />
                <text x="500" y="70" class="boxText">SPLASH SCREEN</text>
                <image href="images/SPLASHSCREEN.png" x="475" y="15" width="50" height="50" />
            </g>

            <!--Home-->
            <g class="hoverEffect" id="HOME">
                <rect x="460" y="120" rx="10" ry="10" width="80" height="80" class="nodeBox" />
                <text x="500" y="180" class="boxText">HOME</text>
                <image href="images/HOME.png" x="475" y="125" width="50" height="50" />
            </g>
            
            <!--ST3 validation-->
            <g class="subHoverEffect" id="ST3_VAL">
                <rect x="40" y="220" rx="10" ry="10" width="80" height="80" class="subNodeBox" />
                <text x="80" y="280" class="subBoxText">ST_3 VALIDATION</text>
                <image href="" x="55" y="370" width="50" height="50" />
            </g>

            <!--ST3 page editor-->
            <g class="subHoverEffect" id="ST3_PE">
                <rect x="140" y="220" rx="10" ry="10" width="80" height="80" class="subNodeBox" />
                <text x="180" y="280" class="subBoxText">ST_3 PAGE EDITOR</text>
                <image href="" x="155" y="370" width="50" height="50" />
            </g>

            <!--ST1 validation-->
            <g class="subHoverEffect" id="ST1_VAL">
                <rect x="280" y="220" rx="10" ry="10" width="80" height="80" class="subNodeBox" />
                <text x="320" y="280" class="subBoxText">ST_1 VALIDATION</text>
                <image href="" x="295" y="295" width="50" height="50" />
            </g>

            <!--ST1 page editor-->
            <g class="subHoverEffect" id="ST1_PE">
                <rect x="380" y="220" rx="10" ry="10" width="80" height="80" class="subNodeBox" />
                <text x="420" y="280" class="subBoxText">ST_1 PAGE EDITOR</text>
                <image href="" x="395" y="370" width="50" height="50" />
            </g>

            <!--ST2 validation-->
            <g class="subHoverEffect" id="ST2_VAL">
                <rect x="540" y="220" rx="10" ry="10" width="80" height="80" class="subNodeBox" />
                <text x="580" y="280" class="subBoxText">ST_2 VALIDATION</text>
                <image href="" x="555" y="370" width="50" height="50" />
            </g>

            <!--ST2 page editor-->
            <g class="subHoverEffect" id="ST2_PE">
                <rect x="640" y="220" rx="10" ry="10" width="80" height="80" class="subNodeBox" />
                <text x="680" y="280" class="subBoxText">ST_2 PAGE EDITOR</text>
                <image href="" x="655" y="295" width="50" height="50" />
            </g>

            <!--ST4 validation-->
            <g class="subHoverEffect" id="ST4_VAL">

            <!--ST4 page editor-->

                <rect x="880" y="220" rx="10" ry="10" width="80" height="80" class="subNodeBox" />

                <image href="" x="895" y="370" width="50" height="50" />
            </g>

            <!--Team-->
            <g class="hoverEffect" id="TEAM">
                <rect x="40" y="365" rx="10" ry="10" width="80" height="80" class="nodeBox" />
                <text x="80" y="425" class="boxText">TEAM</text>
                <image href="" x="55" y="370" width="50" height="50" />
            </g>
            
            <!--Feedback-->
            <g class="hoverEffect" id="FEEDBACK">
                <rect x="180" y="365" rx="10" ry="10" width="80" height="80" class="nodeBox" />
                <text x="220" y="425" class="boxText">FEEDBACK</text>
                <image href="" x="195" y="370" width="50" height="50" />
            </g>
            
            <!--Gallery-->
            <g class="hoverEffect" id="GALLERY">
                <rect x="320" y="365" rx="10" ry="10" width="80" height="80" class="nodeBox" />
                <text x="360" y="425" class="boxText">GALLERY</text>
                <image href="" x="335" y="370" width="50" height="50" />
            </g>

            <!--Content-->
            <g class="hoverEffect" id="CONTENT">

            <!--AIS-->

            <!--User Profile-->

            <!--Sitemap-->
            <g class="hoverEffect" id="SITEMAP">

                <image href="" x="895" y="370" width="50" height="50" />
            </g>

            <!--Content subPage 1-->
            <g class="hoverEffect" id="PAGE1">
                <rect x="190" y="560" rx="10" ry="10" width="80" height="80" class="nodeBox" />
                <text x="230" y="620" class="boxText">PAGE 1</text>
                <image href="images/CONTENT_PAGE.png" x="205" y="565" width="50" height="50" />
            </g>

            <!--Content subPage 2-->
            <g class="hoverEffect" id="PAGE2">
                <rect x="370" y="560" rx="10" ry="10" width="80" height="80" class="nodeBox" />
                <text x="410" y="620" class="boxText">PAGE 2</text>
                <image href="images/CONTENT_PAGE.png" x="385" y="565" width="50" height="50" />
            </g>

            <!--Content subPage 3-->
            <g class="hoverEffect" id="PAGE3">
                <rect x="550" y="560" rx="10" ry="10" width="80" height="80" class="nodeBox" />
                <text x="590" y="620" class="boxText">PAGE 3</text>
                <image href="images/CONTENT_PAGE.png" x="565" y="565" width="50" height="50" />
            </g>

            <!--Content subPage 4-->
            <g class="hoverEffect" id="PAGE4">
                <rect x="730" y="560" rx="10" ry="10" width="80" height="80" class="nodeBox" />
                <text x="770" y="620" class="boxText">PAGE 4</text>
                <image href="images/CONTENT_PAGE.png" x="745" y="565" width="50" height="50" />
            </g>

            <!--Paths-->
            <g class="greenpath">
                <path d="M 500 90 l 0 30" /> <!--Splash : Home-->

                <path d="M 500 285 C 460 340, 80 330, 80 365" /> <!--Home : Team-->
                <path d="M 500 285 C 480 335, 220 330, 220 365" /> <!--Home : Feedback-->
                <path d="M 500 285 C 495 330, 360 330, 360 365" /> <!--Home : Gallery-->
                <path d="M 500 200 l 0 165" /> <!--Home : Content-->
                <path d="M 500 285 C 505 330, 640 330, 640 365" /> <!--Home : AIS-->
                <path d="M 500 285 C 520 335, 780 330, 780 365" /> <!--Home : User Profile-->
                <path d="M 500 285 C 540 340, 920 330, 920 365" /> <!--Home : Sitemap-->

                <path d="M 500 445 C 500 510, 230 500, 230 560" /> <!--Content : Page 1-->
                <path d="M 500 445 C 500 500, 410 500, 410 560" /> <!--Content : Page 2-->
                <path d="M 500 445 C 500 500, 590 500, 590 560" /> <!--Content : Page 3-->
                <path d="M 500 445 C 500 510, 770 500, 770 560" /> <!--Content : Page 4-->
            </g>

            <g class="greypath">

            </g>
            
        </svg>
    </main>

    <hr>

    <footer>
        <p><a href="#">page editor</a></p>
        <p><a href="#">Validation</a></p>
    </footer>
    <script>
        document.getElementById("SPLASH").onclick = function(){
            window.location.href = "splash.html" ;
        }
        document.getElementById("HOME").onclick = function(){
            window.location.href = "home.html" ;
        }
        document.getElementById("CONTENT").onclick = function(){
            window.location.href = "content.html" ;
        }
    </script>
</body>
</html>
