        <h1>Renewable Energy Gallery</h1>

        <div class="gallery">

            <img src="images/solar.jpg" alt="Solar Panels" onclick="openModal('Solar energy uses sunlight to generate electricity using solar panels. It is renewable, reduces electricity bills, and lowers carbon emissions.')">

            <img src="images/wind.jpg" alt="Wind Turbines" onclick="openModal('Wind turbines convert wind into electricity. It is a clean and renewable source that helps reduce reliance on fossil fuels.')">

            <img src="images/hydro.jpg" alt="Hydropower Plant" onclick="openModal('Hydropower generates electricity using flowing water. It is one of the oldest and most reliable renewable energy sources.')">

            <img src="images/led.jpg" alt="Energy Efficiency" onclick="openModal('Energy efficiency means using less energy for the same tasks. Simple actions like switching off lights help reduce environmental impact.')">

            <img src="images/wood.jpg" alt="Biomss Energy" onclick="openModal('Biomass energy is produced from organic materials like plants and waste. It helps reduce landfill waste and produces renewable energy.')">

            <img src="images/charge.jpg" alt="Electric Vehicles" onclick="openModal('Electric vehicles run on electricity instead of fuel. They reduce air pollution and greenhouse gas emissions.')">

        </div>
    </main>
    <div class ="modal" id ="modal">
                <div class="modal-content">
                    <p id ="modalText"></p>
                    <button onclick="closeModal()">close</button>
                </div>
            </div>
            
            <script>
                //JAVASCRIPT
                function openModal (text){
                    document.getElementById("modalText").innerText = text;
                    document.getElementById("modal").style.display="flex";

                }
                function closeModal(){
                    document.getElementById("modal").style.display="none";

                }
                
            </script>
